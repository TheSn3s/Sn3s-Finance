<body class="p-6">

            <button onclick="openAdd()" class="bg-blue-600 text-white px-6 py-2 rounded-xl font-bold">+ إضافة مشروع</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-white p-6 rounded-2xl shadow-sm border text-center">
                <div class="text-slate-400 mb-1">إجمالي المداخيل</div>
                <div id="total" class="text-2xl font-black">0 د.ك</div>

                <div id="y2026" class="text-2xl font-black">0 د.ك</div>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-sm border text-center text-red-600">
                <div class="text-slate-400 mb-1">مبالغ معلقة</div>
                <div id="pending" class="text-2xl font-black">0 د.ك</div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">

            <form id="f" class="space-y-4">
                <input type="hidden" id="editId">
                <input type="date" id="d" required class="w-full p-2 border rounded">
                <input type="text" id="c" required placeholder="العميل" class="w-full p-2 border rounded">
                <input type="text" id="p" required placeholder="المشروع" class="w-full p-2 border rounded">
                <input type="number" id="a" required placeholder="المبلغ" class="w-full p-2 border rounded">
                <select id="s" class="w-full p-2 border rounded">
                    <option value="Paid">مدفوع</option>
                    <option value="Not Paid">معلق</option>
                </select>
                <div class="flex gap-2">
                    <button type="submit" class="flex-grow bg-blue-600 text-white py-2 rounded font-bold">حفظ</button>
                    <button type="button" id="delBtn" onclick="deleteItem()" class="bg-red-50 text-red-600 py-2 rounded font-bold hidden px-4">حذف</button>
                    <button type="button" onclick="closeModal()" class="bg-slate-100 py-2 rounded px-4">إلغاء</button>
                </div>
            </form>
        </div>
    </div>

        function render() {
            const body = document.getElementById('tableBody');
            body.innerHTML = '';
            local = JSON.parse(localStorage.getItem('invoices') || '[]');
            all = [...rawData, ...local];
            let t=0, y=0, p=0;
            
            all.slice().reverse().forEach(i => {
                const amt = parseFloat(i.Amount) || 0;
                
                const s = i.PaymentStatus ? i.PaymentStatus.toString().trim() : '';
                const isPaid = !(s === 'Not Paid' || s === 'معلق' || s === 'pending' || s === 'Pending');

                    t += amt;
                    if(i.Date.includes('2026')) y += amt;

            const item = all.find(i => i.Notes === id);
            const win = window.open('', '_blank');
            win.document.write('<html><body style="padding:50px; font-family:sans-serif;"><h1>Invoice #'+id+'</h1><hr><h3>Client: '+item.Client+'</h3><h3>Project: '+item.Project+'</h3><h2>Total: KWD '+item.Amount+'</h2><button onclick="window.print()">Save as PDF</button></body></html>');
            win.document.close();
        }

        render();
    </script>
</body>
</html>
