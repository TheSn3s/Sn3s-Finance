<body class="p-4 md:p-8">
    <div id="loginOverlay" class="fixed inset-0 bg-slate-900 z-[100] flex items-center justify-center p-4">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-sm text-center">
            <h2 class="text-xl font-bold mb-6">🔐 النظام المالي الخاص</h2>
            <input type="password" id="passInput" placeholder="0600" class="w-full bg-slate-50 border rounded-lg px-4 py-3 text-center text-2xl outline-none mb-4">
            <button onclick="checkPass()" class="w-full bg-slate-800 text-white font-bold py-3 rounded-xl">دخول</button>
            <p id="errorMsg" class="text-red-500 text-sm mt-4 hidden">الرقم السري غير صحيح</p>
        </div>
    </div>

    <div id="mainContent" class="max-w-7xl mx-auto hidden">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-slate-800">النظام المالي - عبدالله السنعوسي</h1>
            <button onclick="openModal('add')" class="bg-blue-600 text-white px-6 py-2 rounded-lg font-bold shadow-lg">➕ إضافة مشروع جديد</button>
        </header>
        <div class="bg-white rounded-2xl shadow-sm border overflow-hidden">
            <table class="w-full text-right">
                <thead class="bg-slate-50 border-b text-slate-500 text-xs font-bold uppercase">

                <tbody id="ledgerBody" class="text-sm"></tbody>
            </table>
        </div>
    </div>

    <div id="modal" class="fixed inset-0 bg-slate-900/50 hidden flex items-center justify-center p-4 z-50">

            <h3 id="modalTitle" class="text-xl font-bold mb-4">مشروع جديد</h3>
            <form id="projectForm" class="space-y-4">
                <input type="hidden" id="editSerial">
                <input type="date" id="fDate" required class="w-full p-2 border rounded">
                <input type="text" id="fClient" required placeholder="العميل" class="w-full p-2 border rounded">
                <input type="text" id="fProject" required placeholder="المشروع" class="w-full p-2 border rounded">
                <input type="number" id="fAmount" required placeholder="المبلغ" class="w-full p-2 border rounded">
                <select id="fPaymentStatus" class="w-full p-2 border rounded"><option value="Paid">مدفوع</option><option value="Not Paid">معلق</option></select>
                <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded font-bold">حفظ البيانات</button>
                <button type="button" onclick="closeModal()" class="w-full bg-slate-100 py-2 rounded mt-2">إلغاء</button>
            </form>
        </div>
    </div>

        function checkPass() {
            const val = document.getElementById('passInput').value;
            console.log('Checking pass:', val);
            if (val === '0600') {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                localStorage.setItem('auth_sn3s', 'true');
                loadData();
            } else {
                alert('الرقم السري غير صحيح');
            }
        }

        // فحص الدخول التلقائي
        window.onload = function() {
            if (localStorage.getItem('auth_sn3s') === 'true') {
                document.getElementById('loginOverlay').style.display = 'none';
                document.getElementById('mainContent').style.display = 'block';
                loadData();
            }
        };

        function loadData() {
            const local = JSON.parse(localStorage.getItem('added_invoices') || '[]');
            combinedData = [...rawData, ...local];
            renderTable(combinedData.reverse());
        }

        function renderTable(data) {
            const body = document.getElementById('ledgerBody');
            body.innerHTML = '';
            data.forEach((e, i) => {
                const row = `
                    <tr class="border-b hover:bg-slate-50" onclick="openModal('edit', ` + i + `)">
                        <td class="p-4">${e.Notes || i+1}</td>
                        <td class="p-4 font-bold">${e.Date}</td>
                        <td class="p-4">${e.Client}</td>
                        <td class="p-4">${e.Project}</td>
                        <td class="p-4 font-black">${e.Amount} د.ك</td>
                        <td class="p-4">${e.PaymentStatus === 'Paid' ? 'مدفوع' : 'معلق'}</td>
                        <td class="p-4"><button onclick="event.stopPropagation(); viewInvoice('${e.Notes}')" class="text-blue-600 underline">الفاتورة</button></td>
                    </tr>`;
                body.innerHTML += row;
            });
        }
        
        // قالب الفاتورة السريع
        function viewInvoice(serial) {
            const data = combinedData.find(inv => inv.Notes === serial);
            if (!data) return alert('غير موجود');
            const win = window.open('', '_blank');
            win.document.write('<html><body style="font-family:sans-serif; padding:50px;"><h1>Invoice #'+serial+'</h1><hr><p>Client: '+data.Client+'</p><p>Project: '+data.Project+'</p><h2>Total: KWD '+data.Amount+'</h2><button onclick="window.print()">Print PDF</button></body></html>');
            win.document.close();
        }

        window.openModal = function() { document.getElementById('modal').style.display = 'flex'; };
        
        
        function generateNextSerial() {
            const local = JSON.parse(localStorage.getItem('added_invoices') || '[]');
            const all = [...rawData, ...local];
            const lastSerial = all.reduce((max, inv) => {
                const s = parseInt(inv.Notes);
                return isNaN(s) ? max : Math.max(max, s);
            }, 0);
            return (lastSerial + 1).toString().padStart(3, '0');
        }

        document.getElementById('projectForm').onsubmit = function(e) {
            e.preventDefault();
            const entry = {
                Date: document.getElementById('fDate').value,
                Client: document.getElementById('fClient').value,
                Project: document.getElementById('fProject').value,
                Amount: document.getElementById('fAmount').value,
                PaymentStatus: document.getElementById('fPaymentStatus').value,
                Notes: generateNextSerial()
            };
            let local = JSON.parse(localStorage.getItem('added_invoices') || '[]');
            local.push(entry);
            localStorage.setItem('added_invoices', JSON.stringify(local));
            alert('تم الحفظ بنجاح!');
            location.reload();
        };

        window.closeModal = function() { document.getElementById('modal').style.display = 'none'; };
